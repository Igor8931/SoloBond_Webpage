<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ring-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8785C"/>
    </linearGradient>
    <linearGradient id="ring-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0E0C0"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
  </defs>
  <!-- Left ring (orange) -->
  <circle cx="12" cy="16" r="8" fill="none" stroke="url(#ring-orange)" stroke-width="4"/>
  <!-- Right ring (gold) -->
  <circle cx="20" cy="16" r="8" fill="none" stroke="url(#ring-gold)" stroke-width="4"/>
</svg>
